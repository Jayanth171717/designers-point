<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - Designers Point</title>
  <link rel="stylesheet" href="/css/styles.css">
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="container">
      <div class="header-inner">
        <a href="/" class="logo">Designers Point</a>
        <nav>
          <ul class="nav-links">
            <li><a href="/">Home</a></li>
            <li><a href="/shop">Shop</a></li>
            <li><a href="/design">Custom Design</a></li>
          </ul>
        </nav>
        <div class="nav-actions">
          <div id="auth-container">
            <a href="/login" class="btn btn-secondary btn-sm">Login</a>
            <a href="/register" class="btn btn-primary btn-sm">Register</a>
          </div>
          <a href="/cart" class="cart-btn">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
            <span class="cart-count" id="cart-count" style="display: none;">0</span>
          </a>
        </div>
        <button class="mobile-menu-btn" id="mobile-menu-btn">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>
      </div>
    </div>
  </header>

  <div class="mobile-overlay" id="mobile-overlay"></div>
  <nav class="mobile-nav" id="mobile-nav">
    <button class="mobile-close-btn" id="mobile-close-btn" style="position: absolute; top: 20px; right: 20px; background: none; border: none; color: white; cursor: pointer;">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
    </button>
    <ul>
      <li><a href="/">Home</a></li>
      <li><a href="/shop">Shop</a></li>
      <li><a href="/design">Custom Design</a></li>
      <li><a href="/cart">Cart</a></li>
    </ul>
  </nav>

  <!-- Checkout Page -->
  <section class="checkout-page">
    <div class="container">
      <h2 style="margin-bottom: 40px;">Checkout</h2>

      <div class="checkout-grid">
        <div class="checkout-form">
          <form id="checkout-form" onsubmit="return handleCheckout(event)">
            <!-- Contact Info -->
            <div class="form-section">
              <h3>Contact Information</h3>
              <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" required placeholder="your@email.com">
              </div>
              <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="fullname" required placeholder="John Doe">
              </div>
              <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" id="phone" required placeholder="+91 98765 43210">
              </div>
            </div>

            <!-- Shipping Address -->
            <div class="form-section">
              <h3>Shipping Address</h3>
              <div class="form-group">
                <label>Flat/House No., Building Name</label>
                <input type="text" id="address" required placeholder="123, ABC Apartments">
              </div>
              <div class="form-group">
                <label>Area, Lane, Street</label>
                <input type="text" id="street" placeholder="MG Road, Sector 15">
              </div>
              <div class="form-group">
                <label>Landmark (Optional)</label>
                <input type="text" id="landmark" placeholder="Near Metro Station">
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label>City</label>
                  <input type="text" id="city" required placeholder="Mumbai">
                </div>
                <div class="form-group">
                  <label>State</label>
                  <select id="state" required>
                    <option value="">Select State</option>
                    <option value="Andhra Pradesh">Andhra Pradesh</option>
                    <option value="Arunachal Pradesh">Arunachal Pradesh</option>
                    <option value="Assam">Assam</option>
                    <option value="Bihar">Bihar</option>
                    <option value="Chhattisgarh">Chhattisgarh</option>
                    <option value="Goa">Goa</option>
                    <option value="Gujarat">Gujarat</option>
                    <option value="Haryana">Haryana</option>
                    <option value="Himachal Pradesh">Himachal Pradesh</option>
                    <option value="Jharkhand">Jharkhand</option>
                    <option value="Karnataka">Karnataka</option>
                    <option value="Kerala">Kerala</option>
                    <option value="Madhya Pradesh">Madhya Pradesh</option>
                    <option value="Maharashtra">Maharashtra</option>
                    <option value="Manipur">Manipur</option>
                    <option value="Meghalaya">Meghalaya</option>
                    <option value="Mizoram">Mizoram</option>
                    <option value="Nagaland">Nagaland</option>
                    <option value="Odisha">Odisha</option>
                    <option value="Punjab">Punjab</option>
                    <option value="Rajasthan">Rajasthan</option>
                    <option value="Sikkim">Sikkim</option>
                    <option value="Tamil Nadu">Tamil Nadu</option>
                    <option value="Telangana">Telangana</option>
                    <option value="Tripura">Tripura</option>
                    <option value="Uttar Pradesh">Uttar Pradesh</option>
                    <option value="Uttarakhand">Uttarakhand</option>
                    <option value="West Bengal">West Bengal</option>
                    <option value="Delhi">Delhi</option>
                  </select>
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label>PIN Code</label>
                  <input type="text" id="postal" required placeholder="400001" maxlength="6" pattern="[0-9]{6}">
                </div>
                <div class="form-group">
                  <label>Country</label>
                  <select id="country" required>
                    <option value="IN" selected>India</option>
                  </select>
                </div>
              </div>
            </div>

            <!-- Payment Method -->
            <div class="form-section">
              <h3>Payment Method</h3>
              <div class="payment-options">
                <label class="payment-option">
                  <input type="radio" name="payment_method" value="cod" checked>
                  <div class="payment-option-content">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                    <div>
                      <strong>Cash on Delivery</strong>
                      <span>Pay when you receive (Recommended)</span>
                    </div>
                  </div>
                </label>
                <label class="payment-option">
                  <input type="radio" name="payment_method" value="razorpay">
                  <div class="payment-option-content">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect><line x1="1" y1="10" x2="23" y2="10"></line></svg>
                    <div>
                      <strong>Pay Online (UPI / Cards / Netbanking)</strong>
                      <span>Instant payment via Razorpay</span>
                    </div>
                  </div>
                </label>
              </div>
            </div>

            <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;" id="place-order-btn">
              <span id="btn-text">Place Order</span>
              <span id="btn-loader" class="spinner" style="display: none;"></span>
            </button>
          </form>
        </div>

        <!-- Order Summary -->
        <div class="order-summary">
          <h3>Order Summary</h3>
          <div class="order-items" id="order-items">
            <div class="loading"><div class="spinner"></div></div>
          </div>
          <div class="summary-row">
            <span>Subtotal</span>
            <span id="summary-subtotal">₹0.00</span>
          </div>
          <div class="summary-row">
            <span>Shipping</span>
            <span id="summary-shipping">₹99.00</span>
          </div>
          <div class="summary-row">
            <span>GST (18%)</span>
            <span id="summary-tax">₹0.00</span>
          </div>
          <div class="summary-row total">
            <span>Total</span>
            <span class="value" id="summary-total">₹0.00</span>
          </div>
        </div>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>&copy; 2024 Designers Point. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/app.js"></script>
  <script>
    let razorpayKey = null;

    // Get Razorpay key on load
    async function getRazorpayKey() {
      try {
        const res = await fetch('/api/payment/key');
        const data = await res.json();
        razorpayKey = data.key;
      } catch (e) {
        console.error('Failed to get Razorpay key:', e);
      }
    }

    function initPage() {
      renderOrderItems();
      getRazorpayKey();

      // Payment method toggle
      document.querySelectorAll('input[name="payment_method"]').forEach(radio => {
        radio.addEventListener('change', function() {
          document.querySelectorAll('.payment-option').forEach(opt => opt.classList.remove('active'));
          this.closest('.payment-option').classList.add('active');
        });
      });
    }

    function renderOrderItems() {
      const container = document.getElementById('order-items');

      if (state.cart.length === 0) {
        container.innerHTML = '<p style="color: var(--text-secondary);">Your cart is empty</p>';
        updateSummary();
        return;
      }

      container.innerHTML = state.cart.map(item => `
        <div class="order-item">
          <div class="order-item-image">
            ${item.product_image ? `<img src="${item.product_image}" alt="${item.product_name}">` : ''}
          </div>
          <div class="order-item-info">
            <h4>${item.product_name}</h4>
            <span>${item.size} / ${item.color} x ${item.quantity}</span>
          </div>
          <div class="order-item-price">${formatPrice(item.price * item.quantity)}</div>
        </div>
      `).join('');

      updateSummary();
    }

    function updateSummary() {
      const subtotal = state.cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
      const shipping = subtotal > 0 ? 99 : 0;
      const tax = subtotal * 0.18;
      const total = subtotal + shipping + tax;

      document.getElementById('summary-subtotal').textContent = formatPrice(subtotal);
      document.getElementById('summary-tax').textContent = formatPrice(tax);
      document.getElementById('summary-total').textContent = formatPrice(total);
    }

    function getOrderTotal() {
      const subtotal = state.cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
      const shipping = 99;
      const tax = subtotal * 0.18;
      return subtotal + shipping + tax;
    }

    async function handleCheckout(e) {
      e.preventDefault();

      if (state.cart.length === 0) {
        showToast('Your cart is empty', 'error');
        return false;
      }

      const email = document.getElementById('email').value;
      const fullname = document.getElementById('fullname').value;
      const phone = document.getElementById('phone').value;
      const address = document.getElementById('address').value;
      const street = document.getElementById('street').value;
      const landmark = document.getElementById('landmark').value;
      const city = document.getElementById('city').value;
      const stateVal = document.getElementById('state').value;
      const postal = document.getElementById('postal').value;
      const paymentMethod = document.querySelector('input[name="payment_method"]:checked').value;

      const fullAddress = `${address}${street ? ', ' + street : ''}${landmark ? ', Near ' + landmark : ''}, ${city}, ${stateVal} - ${postal}`;

      const orderData = {
        guest_email: email,
        guest_name: fullname,
        shipping_name: fullname,
        shipping_phone: phone,
        shipping_address: fullAddress,
        city: city,
        state: stateVal,
        postal_code: postal,
        payment_method: paymentMethod,
        items: state.cart.map(item => ({
          product_id: item.product_id,
          product_name: item.product_name,
          product_image: item.product_image,
          custom_design: item.custom_design,
          quantity: item.quantity,
          size: item.size,
          color: item.color,
          price: item.price
        }))
      };

      const btn = document.getElementById('place-order-btn');
      const btnText = document.getElementById('btn-text');
      const btnLoader = document.getElementById('btn-loader');

      if (paymentMethod === 'razorpay') {
        // Process with Razorpay
        btn.disabled = true;
        btnText.textContent = 'Processing...';
        btnLoader.style.display = 'inline-block';

        try {
          // Create order on server
          const totalAmount = getOrderTotal();
          const orderRes = await fetch('/api/payment/create-order', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ amount: totalAmount })
          });

          const orderResult = await orderRes.json();

          if (!orderRes.ok) {
            throw new Error(orderResult.error || 'Failed to create payment order');
          }

          // Open Razorpay checkout
          const options = {
            key: razorpayKey,
            name: 'Designers Point',
            description: 'Order Payment',
            order_id: orderResult.id,
            amount: orderResult.amount,
            currency: orderResult.currency || 'INR',
            handler: async function(response) {
              // Verify payment
              const verifyRes = await fetch('/api/payment/verify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  razorpay_order_id: response.razorpay_order_id,
                  razorpay_payment_id: response.razorpay_payment_id,
                  razorpay_signature: response.razorpay_signature
                })
              });

              const verifyResult = await verifyRes.json();

              if (verifyRes.ok && verifyResult.verified) {
                // Create order after successful payment
                const createOrderRes = await fetch('/api/orders', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify(orderData)
                });

                const createOrderResult = await createOrderRes.json();

                if (createOrderRes.ok) {
                  showToast('Payment successful! Order placed!', 'success');
                  state.cart = [];
                  updateCartUI();
                  setTimeout(() => {
                    window.location.href = `/orders?order=${createOrderResult.orderNumber}`;
                  }, 1500);
                } else {
                  showToast(createOrderResult.error || 'Order creation failed', 'error');
                }
              } else {
                showToast('Payment verification failed', 'error');
              }

              btn.disabled = false;
              btnText.textContent = 'Place Order';
              btnLoader.style.display = 'none';
            },
            modal: {
              ondismiss: function() {
                btn.disabled = false;
                btnText.textContent = 'Place Order';
                btnLoader.style.display = 'none';
              }
            },
            prefill: {
              name: fullname,
              email: email,
              contact: phone
            },
            theme: {
              color: '#e94560'
            }
          };

          const rzp = new Razorpay(options);
          rzp.open();

        } catch (err) {
          console.error('Payment error:', err);
          showToast(err.message || 'Payment failed. Please try again.', 'error');
          btn.disabled = false;
          btnText.textContent = 'Place Order';
          btnLoader.style.display = 'none';
        }

      } else {
        // Cash on Delivery
        btn.disabled = true;
        btnText.textContent = 'Processing...';
        btnLoader.style.display = 'inline-block';

        try {
          const res = await fetch('/api/orders', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(orderData)
          });

          const data = await res.json();

          if (res.ok) {
            showToast('Order placed successfully! (COD)', 'success');
            state.cart = [];
            updateCartUI();
            setTimeout(() => {
              window.location.href = `/orders?order=${data.orderNumber}`;
            }, 1500);
          } else {
            showToast(data.error || 'Order failed', 'error');
          }
        } catch (err) {
          showToast('Order failed. Please try again.', 'error');
        }

        btn.disabled = false;
        btnText.textContent = 'Place Order';
        btnLoader.style.display = 'none';
      }

      return false;
    }
  </script>
</body>
</html>
