<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Designers Point</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <section class="auth-page">
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-logo">
          <a href="/" class="logo">Designers Point</a>
        </div>
        <h2>Create Account</h2>
        <form id="register-form">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="name" required placeholder="John Doe">
          </div>
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" required placeholder="your@email.com" onblur="checkEmail()">
            <small id="email-status" style="display: block; margin-top: 4px;"></small>
          </div>
          <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" id="phone" placeholder="+1 234 567 8900">
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" required placeholder="Create a password" minlength="8" onkeyup="validatePassword()">
            <div id="password-rules" style="margin-top: 8px; font-size: 12px;">
              <div id="rule-length" style="color: #dc3545;">• At least 8 characters</div>
              <div id="rule-upper" style="color: #dc3545;">• One uppercase letter (A-Z)</div>
              <div id="rule-lower" style="color: #dc3545;">• One lowercase letter (a-z)</div>
              <div id="rule-number" style="color: #dc3545;">• One number (0-9)</div>
              <div id="rule-special" style="color: #dc3545;">• One special character (!@#$%^&*)</div>
            </div>
          </div>
          <div class="form-group" id="otp-section" style="display: none;">
            <label>Email OTP</label>
            <input type="text" id="otp" placeholder="Enter 6-digit OTP" maxlength="6" autocomplete="one-time-code" style="font-size: 18px; letter-spacing: 8px; text-align: center; padding: 12px;">
            <div style="margin-top: 10px;">
              <button type="button" id="resend-btn" class="btn btn-secondary" onclick="resendOTP()">Resend OTP</button>
            </div>
            <small style="color: #666;">OTP sent to your email. Valid for 10 minutes.</small>
          </div>
          <button type="button" id="submit-btn" class="btn btn-primary" onclick="handleRegister()">Create Account</button>
          <button type="button" id="verify-btn" class="btn btn-primary" style="display: none;" onclick="verifyOTP()">Verify OTP</button>
        </form>
        <div class="auth-divider">or</div>
        <a href="/login" class="btn btn-secondary" style="width: 100%; text-align: center;">Login</a>
        <div class="auth-footer">
          <p>Already have an account? <a href="/login">Login</a></p>
        </div>
      </div>
    </div>
  </section>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/app.js"></script>
  <script>
    let isWaitingForOTP = false;
    let isPasswordValid = false;

    // Handle Enter key to prevent form submission
    document.addEventListener('DOMContentLoaded', function() {
      document.getElementById('otp').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
          e.preventDefault();
          verifyOTP();
        }
      });
    });

    function validatePassword() {
      const password = document.getElementById('password').value;

      const rules = {
        'rule-length': password.length >= 8,
        'rule-upper': /[A-Z]/.test(password),
        'rule-lower': /[a-z]/.test(password),
        'rule-number': /[0-9]/.test(password),
        'rule-special': /[!@#$%^&*]/.test(password)
      };

      for (const [id, valid] of Object.entries(rules)) {
        const element = document.getElementById(id);
        element.style.color = valid ? '#28a745' : '#dc3545';
      }

      isPasswordValid = Object.values(rules).every(v => v);
      return isPasswordValid;
    }

    async function checkEmail() {
      const email = document.getElementById('email').value;
      const status = document.getElementById('email-status');

      if (!email || !email.includes('@')) {
        status.textContent = '';
        return;
      }

      try {
        const response = await fetch(`/api/auth/check-email?email=${encodeURIComponent(email)}`);
        const data = await response.json();

        if (data.exists) {
          status.textContent = 'This email is already registered';
          status.style.color = '#dc3545';
        } else {
          status.textContent = 'Email is available';
          status.style.color = '#28a745';
        }
      } catch (err) {
        console.error('Error checking email:', err);
      }
    }

    async function handleRegister() {
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const phone = document.getElementById('phone').value;
      const password = document.getElementById('password').value;

      if (isWaitingForOTP) {
        return false;
      }

      // Validate password
      if (!validatePassword()) {
        alert('Please create a stronger password. Follow all the password rules.');
        return false;
      }

      const submitBtn = document.getElementById('submit-btn');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Sending OTP...';

      try {
        const response = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, phone, password })
        });

        const data = await response.json();

        if (response.ok && data.success) {
          // Show OTP section
          document.getElementById('otp-section').style.display = 'block';
          document.getElementById('submit-btn').style.display = 'none';
          document.getElementById('verify-btn').style.display = 'block';
          document.getElementById('email').readOnly = true;
          document.getElementById('name').readOnly = true;
          document.getElementById('phone').readOnly = true;
          document.getElementById('password').readOnly = true;
          isWaitingForOTP = true;

          alert('OTP sent to your email! Please enter it to complete registration.');
        } else {
          alert(data.error || 'Failed to send OTP');
        }
      } catch (err) {
        console.error('Error:', err);
        alert('Failed to send OTP. Please try again.');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Create Account';
      }

      return false;
    }

    async function verifyOTP() {
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const phone = document.getElementById('phone').value;
      const password = document.getElementById('password').value;
      const otp = document.getElementById('otp').value;

      if (!otp || otp.length !== 6) {
        alert('Please enter a valid 6-digit OTP');
        return;
      }

      const verifyBtn = document.getElementById('verify-btn');
      verifyBtn.disabled = true;
      verifyBtn.textContent = 'Verifying...';

      try {
        const response = await fetch('/api/auth/register/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, phone, password, otp })
        });

        const data = await response.json();

        if (response.ok && data.success) {
          alert('Registration successful! Welcome to Designers Point.');
          window.location.href = '/';
        } else {
          alert(data.error || 'Verification failed');
        }
      } catch (err) {
        console.error('Error:', err);
        alert('Verification failed. Please try again.');
      } finally {
        verifyBtn.disabled = false;
        verifyBtn.textContent = 'Verify OTP';
      }
    }

    async function resendOTP() {
      const email = document.getElementById('email').value;

      const resendBtn = document.getElementById('resend-btn');
      resendBtn.disabled = true;
      resendBtn.textContent = 'Sending...';

      try {
        const response = await fetch('/api/auth/register/send-otp', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });

        const data = await response.json();

        if (response.ok && data.success) {
          alert('New OTP sent to your email!');
        } else {
          alert(data.error || 'Failed to resend OTP');
        }
      } catch (err) {
        console.error('Error:', err);
        alert('Failed to resend OTP');
      } finally {
        resendBtn.disabled = false;
        resendBtn.textContent = 'Resend';
      }
    }
  </script>
</body>
</html>
