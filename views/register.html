<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Designers Point</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <section class="auth-page">
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-logo">
          <a href="/" class="logo">Designers Point</a>
        </div>
        <h2>Create Account</h2>
        <form id="register-form" onsubmit="return handleRegister(event)">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="name" required placeholder="John Doe">
          </div>
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" required placeholder="your@email.com">
          </div>
          <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" id="phone" placeholder="+1 234 567 8900">
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" required placeholder="Create a password">
          </div>
          <button type="submit" class="btn btn-primary">Create Account</button>
        </form>
        <div class="auth-divider">or</div>
        <a href="/login" class="btn btn-secondary" style="width: 100%; text-align: center;">Login</a>
        <div class="auth-footer">
          <p>Already have an account? <a href="/login">Login</a></p>
        </div>
      </div>
    </div>
  </section>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/app.js"></script>
  <script>
    async function handleRegister(e) {
      e.preventDefault();
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const phone = document.getElementById('phone').value;
      const password = document.getElementById('password').value;

      const success = await register(name, email, password);
      if (success) {
        window.location.href = '/';
      }
      return false;
    }
  </script>
</body>
</html>
