<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart - Designers Point</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="container">
      <div class="header-inner">
        <a href="/" class="logo">Designers Point</a>
        <nav>
          <ul class="nav-links">
            <li><a href="/">Home</a></li>
            <li><a href="/shop">Shop</a></li>
            <li><a href="/design">Custom Design</a></li>
          </ul>
        </nav>
        <div class="nav-actions">
          <div id="auth-container">
            <a href="/login" class="btn btn-secondary btn-sm">Login</a>
            <a href="/register" class="btn btn-primary btn-sm">Register</a>
          </div>
          <a href="/cart" class="cart-btn">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
            <span class="cart-count" id="cart-count" style="display: none;">0</span>
          </a>
        </div>
        <button class="mobile-menu-btn" id="mobile-menu-btn">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>
      </div>
    </div>
  </header>

  <div class="mobile-overlay" id="mobile-overlay"></div>
  <nav class="mobile-nav" id="mobile-nav">
    <button class="mobile-close-btn" id="mobile-close-btn" style="position: absolute; top: 20px; right: 20px; background: none; border: none; color: white; cursor: pointer;">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
    </button>
    <ul>
      <li><a href="/">Home</a></li>
      <li><a href="/shop">Shop</a></li>
      <li><a href="/design">Custom Design</a></li>
      <li><a href="/cart">Cart</a></li>
    </ul>
  </nav>

  <!-- Cart Page -->
  <section class="cart-page">
    <div class="container">
      <h2 style="margin-bottom: 40px;">Your Cart</h2>

      <div class="cart-grid">
        <div class="cart-items" id="cart-items">
          <div class="loading"><div class="spinner"></div></div>
        </div>

        <div class="cart-summary">
          <h3>Order Summary</h3>
          <div class="summary-row">
            <span>Subtotal</span>
            <span id="cart-subtotal">$0.00</span>
          </div>
          <div class="summary-row">
            <span>Shipping</span>
            <span>Calculated at checkout</span>
          </div>
          <div class="summary-row">
            <span>Tax</span>
            <span>Calculated at checkout</span>
          </div>
          <div class="summary-row total">
            <span>Total</span>
            <span class="value" id="cart-total">$0.00</span>
          </div>
          <a href="/checkout" class="btn btn-primary" id="checkout-btn">Proceed to Checkout</a>
        </div>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>&copy; 2024 Designers Point. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/app.js"></script>
  <script>
    function initPage() {
      renderCartItems();
    }

    function renderCartItems() {
      const container = document.getElementById('cart-items');

      if (state.cart.length === 0) {
        container.innerHTML = `
          <div class="empty-cart">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
            <h3>Your cart is empty</h3>
            <p>Looks like you haven't added any items yet.</p>
            <a href="/shop" class="btn btn-primary">Start Shopping</a>
          </div>
        `;
        updateCartSummary();
        return;
      }

      container.innerHTML = state.cart.map(item => `
        <div class="cart-item">
          <div class="cart-item-image">
            ${item.product_image ? `<img src="${item.product_image}" alt="${item.product_name}">` : ''}
          </div>
          <div class="cart-item-details">
            <h3>${item.product_name}</h3>
            <div class="cart-item-meta">
              <span>Size: ${item.size}</span>
              <span>Color: ${item.color}</span>
            </div>
            ${item.custom_design ? '<div class="cart-item-meta"><span>Custom Design</span></div>' : ''}
            <div class="cart-item-quantity">
              <button onclick="updateItemQuantity(${item.id}, ${item.quantity - 1})">-</button>
              <span>${item.quantity}</span>
              <button onclick="updateItemQuantity(${item.id}, ${item.quantity + 1})">+</button>
            </div>
          </div>
          <div class="cart-item-price">
            <div class="price">${formatPrice(item.price * item.quantity)}</div>
            <button class="remove-btn" onclick="removeItem(${item.id})">Remove</button>
          </div>
        </div>
      `).join('');

      updateCartSummary();
    }

    function updateItemQuantity(id, quantity) {
      if (quantity < 1) {
        removeItem(id);
        return;
      }
      updateCartItem(id, quantity);
    }

    function removeItem(id) {
      removeCartItem(id);
    }

    function updateCartSummary() {
      const subtotal = state.cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
      document.getElementById('cart-subtotal').textContent = formatPrice(subtotal);
      document.getElementById('cart-total').textContent = formatPrice(subtotal);

      const checkoutBtn = document.getElementById('checkout-btn');
      if (state.cart.length === 0) {
        checkoutBtn.style.pointerEvents = 'none';
        checkoutBtn.style.opacity = '0.5';
      } else {
        checkoutBtn.style.pointerEvents = 'auto';
        checkoutBtn.style.opacity = '1';
      }
    }
  </script>
</body>
</html>
