services:
  - type: web
    name: designers-point
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: PGHOST
        fromDatabase:
          name: designers-point-db
          property: host
      - key: PGPORT
        fromDatabase:
          name: designers-point-db
          property: port
      - key: PGUSER
        fromDatabase:
          name: designers-point-db
          property: user
      - key: PGDATABASE
        fromDatabase:
          name: designers-point-db
          property: name
      - key: PGPASSWORD
        fromDatabase:
          name: designers-point-db
          property: password
      - key: SESSION_SECRET
        generateValue: true
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USER
        value: your-email@gmail.com
      - key: EMAIL_PASS
        value: your-app-password
      - key: RAZORPAY_KEY_ID
        value: your-razorpay-key-id
      - key: RAZORPAY_KEY_SECRET
        value: your-razorpay-secret
